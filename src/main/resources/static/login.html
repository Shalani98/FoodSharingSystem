<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FoodShare Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7f6; }
        .card-box {
            max-width: 400px;
            margin: 60px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            background: white;
        }
        button { width: 100%; }
        .nav-link.active { background-color: #198754; color: white !important; }
    </style>
</head>
<body>

<div class="card-box">

    <h3 class="text-center text-success mb-3">🌿 FoodShare</h3>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <button id="loginTab" class="nav-link active" onclick="showLogin()">Login</button>
        </li>
        <li class="nav-item">
            <button id="registerTab" class="nav-link" onclick="showRegister()">Register</button>
        </li>
    </ul>

    <!-- LOGIN -->
    <div id="loginBox">
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-success mb-2" onclick="login()">Login</button>
    </div>

    <!-- REGISTER -->
    <div id="registerBox" style="display:none;">
        <input type="text" id="regUsername" class="form-control mb-2" placeholder="Username">
        <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email">
        <input type="password" id="regPassword" class="form-control mb-2" placeholder="Password">
        <select id="regRole" class="form-control mb-2">
            <option value="DONOR">Donor</option>
        </select>
        <button class="btn btn-primary mb-2" onclick="register()">Register</button>
    </div>

    <p class="text-danger text-center" id="msg"></p>

</div>

<script>
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");

    function showLogin() {
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("registerBox").style.display = "none";
        loginTab.classList.add("active");
        registerTab.classList.remove("active");
        document.getElementById("msg").innerText = "";
    }

    function showRegister() {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("registerBox").style.display = "block";
        loginTab.classList.remove("active");
        registerTab.classList.add("active");
        document.getElementById("msg").innerText = "";
    }

    // LOGIN
    function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if(!email || !password){
            document.getElementById("msg").innerText = "Please enter both email and password.";
            return;
        }

        fetch('/users/login', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({email, password})
        })
        .then(res => res.text())
        .then(msg => {
            msg = msg.toUpperCase(); // case-insensitive check
            if(msg.includes("ADMIN")) {
                window.location.href = "admin.html";
            } else if(msg.includes("DONOR")) {
                window.location.href = "index.html";
            } else {
                document.getElementById("msg").innerText = msg;
            }
        })
        .catch(err => {
            document.getElementById("msg").innerText = "Server error. Try again later.";
            console.error(err);
        });
    }

    // REGISTER
    function register() {
        const username = document.getElementById("regUsername").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value.trim();
        const role = document.getElementById("regRole").value;

        if(!username || !email || !password){
            document.getElementById("msg").innerText = "Please fill all fields.";
            return;
        }

        fetch('/users/register', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username, email, password, role})
        })
        .then(res => res.text())
        .then(msg => {
            document.getElementById("msg").innerText = msg;
            showLogin();
        })
        .catch(err => {
            document.getElementById("msg").innerText = "Registration failed. Try again later.";
            console.error(err);
        });
    }
</script>

</body>
</html>
